# nginx server block for cfe.oddshoesdev.xyz
# Symlink into /etc/nginx/sites-enabled/cfe
# Managed by Certbot for SSL — do not remove the listen/ssl lines at the bottom.

server {
    server_name cfe.oddshoesdev.xyz;
    root /var/www/cfe;
    index index.html;

    # API reverse-proxy to Fastify on port 4000
    location /api/ {
        proxy_pass http://127.0.0.1:4000/;
        proxy_http_version 1.1;
        # Clear Connection header so nginx does not forward "Connection: close"
        # from the browser — required for correct HTTP/1.1 keep-alive to upstream.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # URA rate sync (Puppeteer scrape) can take up to 20 s — give plenty of room.
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # SPA fallback — all unknown paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cfe.oddshoesdev.xyz/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cfe.oddshoesdev.xyz/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = cfe.oddshoesdev.xyz) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    listen [::]:80;
    server_name cfe.oddshoesdev.xyz;
    return 404; # managed by Certbot
}
